<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打卡系統 - 分頁 Demo</title>
<style>
  :root{
    --green:#17c964;
    --green-dark:#12a352;
    --ink:#1c1f26;
    --sub:#7a8290;
    --bg:#f4f6f8;
    --card:#ffffff;
    --line:#e7eaee;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Microsoft JhengHei",sans-serif;
    background:var(--bg);
    display:flex;
    justify-content:center;
    padding:32px 16px;
  }
  .phone{
    width:380px;
    background:var(--card);
    border-radius:28px;
    box-shadow:0 20px 60px rgba(20,30,50,.15);
    overflow:hidden;
    border:1px solid var(--line);
  }
  .header{
    padding:18px 20px 14px;
    border-bottom:1px solid var(--line);
  }
  .header h1{
    margin:0;
    font-size:17px;
    font-weight:700;
    color:var(--ink);
  }
  .header p{
    margin:4px 0 0;
    font-size:12px;
    color:var(--sub);
  }

  /* Tabs */
  .tabbar{
    display:flex;
    padding:14px 20px 0;
    gap:8px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:10px 0;
    font-size:14px;
    font-weight:600;
    color:var(--sub);
    background:#eef1f4;
    border-radius:10px 10px 0 0;
    cursor:pointer;
    transition:all .18s ease;
    user-select:none;
  }
  .tab.active{
    background:var(--green);
    color:#fff;
  }
  .tab:not(.active):hover{
    background:#e2e6eb;
  }

  .panel{
    padding:20px;
    min-height:220px;
  }
  .panel[hidden]{display:none;}

  .grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px 8px;
  }
  .item{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    cursor:pointer;
  }
  .icon{
    width:46px;
    height:46px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    background:#f0f2f5;
    border:1px solid var(--line);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .item:hover .icon{
    transform:translateY(-2px);
    box-shadow:0 6px 14px rgba(20,30,50,.08);
  }
  .label{
    font-size:11.5px;
    color:var(--ink);
    text-align:center;
  }

  /* icon accent colors */
  .icon.green{color:var(--green);}
  .icon.blue{color:#2f7bf0;}
  .icon.orange{color:#f0a72f;}
  .icon.red{color:#ef4444;}
  .icon.purple{color:#8b5cf6;}

  .admin-card{
    background:#f9fafb;
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    margin-bottom:12px;
  }
  .admin-card .row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:6px;
  }
  .admin-card .row:last-child{margin-bottom:0;}
  .admin-card .k{font-size:12.5px;color:var(--sub);}
  .admin-card .v{font-size:14px;font-weight:700;color:var(--ink);}
  .admin-card .v.big{font-size:20px;color:var(--green-dark);}

  .footnote{
    padding:12px 20px 20px;
    font-size:11px;
    color:#b7bcc4;
    text-align:center;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="header">
    <h1>打卡之星</h1>
    <p>點擊下方分頁切換「我要打卡」與「管理員」畫面</p>
  </div>

  <div class="tabbar">
    <div class="tab active" data-tab="user" onclick="switchTab('user')">我要打卡</div>
    <div class="tab" data-tab="admin" onclick="switchTab('admin')">管理員</div>
  </div>

  <!-- 我要打卡 panel -->
  <div class="panel" id="panel-user">
    <div class="grid">
      <div class="item"><div class="icon blue">📍</div><div class="label">忘記打卡</div></div>
      <div class="item"><div class="icon orange">⏱️</div><div class="label">我要打卡</div></div>
      <div class="item"><div class="icon green">✅</div><div class="label">我要請假</div></div>
      <div class="item"><div class="icon blue">➕</div><div class="label">我要加班</div></div>
      <div class="item"><div class="icon green">📅</div><div class="label">出勤紀錄</div></div>
      <div class="item"><div class="icon purple">📋</div><div class="label">我的坦表</div></div>
      <div class="item"><div class="icon orange">💰</div><div class="label">我的薪資</div></div>
      <div class="item"><div class="icon red">⚙️</div><div class="label">更多功能</div></div>
    </div>
  </div>

  <!-- 管理員 panel -->
  <div class="panel" id="panel-admin" hidden>
    <div class="admin-card">
      <div class="row"><span class="k">上班打卡</span><span class="v big">16 / 21</span></div>
      <div class="row"><span class="k">已到 / 應到</span></div>
    </div>
    <div class="admin-card">
      <div class="row"><span class="k">未打卡</span><span class="v">5</span></div>
      <div class="row"><span class="k">遲到</span><span class="v">2</span></div>
      <div class="row"><span class="k">請假</span><span class="v">3</span></div>
      <div class="row"><span class="k">加班</span><span class="v">0</span></div>
    </div>
    <div class="admin-card">
      <div class="row"><span class="k">出勤率</span><span class="v">21</span></div>
      <div class="row"><span class="k">準時</span><span class="v">19</span></div>
      <div class="row"><span class="k">遲到</span><span class="v">1</span></div>
    </div>
  </div>

  <div class="footnote">分頁切換 Demo — 可再串接真實打卡 / 後台資料</div>
</div>

<script>
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>{
    t.classList.toggle('active', t.dataset.tab === name);
  });
  document.getElementById('panel-user').hidden = name !== 'user';
  document.getElementById('panel-admin').hidden = name !== 'admin';
}
</script>

</body>
</html>
